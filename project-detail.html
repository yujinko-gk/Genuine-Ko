<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Project | Genuine Ko</title>
    <meta name="description" content="Project detail — Genuine Ko portfolio.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="project-detail-page">
    <header class="detail-header">
        <a href="index.html#work" class="detail-back">← Work</a>
    </header>

    <main class="detail-main">
        <aside class="detail-sidebar" id="detail-thumbs" aria-label="Project images"></aside>
        <section class="detail-center">
            <div class="detail-page-video" id="detail-page-video" hidden>
                <iframe
                    id="detail-page-youtube"
                    class="detail-page-youtube"
                    title="Project video"
                    referrerpolicy="strict-origin-when-cross-origin"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen
                    loading="lazy"></iframe>
            </div>
            <div
                class="detail-article-lead"
                id="detail-article-lead"
                hidden
                aria-label="Project introduction"></div>
            <figure class="detail-figure">
                <img src="" alt="" id="detail-hero">
            </figure>
            <div
                class="detail-article-after-hero"
                id="detail-article-after-hero"
                hidden
                aria-label="Project essay"></div>
            <div class="detail-artwork-footer">
                <div class="detail-artwork-description" id="detail-artwork-description" hidden></div>
                <div class="detail-artwork-spec" id="detail-artwork-spec" hidden></div>
            </div>
        </section>
        <article class="detail-article">
            <h1 class="detail-title" id="detail-title"></h1>
            <p class="detail-year" id="detail-year" hidden></p>
            <p class="detail-desc" id="detail-desc"></p>
            <div class="detail-body" id="detail-body-wrap" hidden>
                <p id="detail-body"></p>
            </div>
        </article>
        <div
            class="detail-longform"
            id="detail-longform"
            hidden
            aria-label="Project write-up"></div>
    </main>

    <script src="projects-data.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/OBJLoader.js"></script>
    <script src="obj-viewer.js"></script>
    <script src="project-detail.js"></script>
</body>

</html>
